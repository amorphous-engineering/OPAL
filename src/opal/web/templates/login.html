<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OPAL</title>
    <script>
        (function() {
            var theme = localStorage.getItem('opal_theme') || 'dark';
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            width: 400px;
            max-width: 90vw;
        }
        .login-header {
            text-align: center;
            margin-bottom: var(--space-lg);
        }
        .login-brand {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-orange);
            letter-spacing: 0.1em;
        }
        .login-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: var(--space-xs);
        }
        .login-divider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin: var(--space-lg) 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-brand">OPAL</div>
            <div class="login-subtitle">Operations, Procedures, Assets, Logistics</div>
        </div>

        {% if auth_mode is defined and auth_mode == "exe" %}
        <div class="panel">
            <div class="panel-header">EXTERNAL AUTH</div>
            <div class="panel-body">
                <p class="mono" style="margin-bottom: var(--space-md);">Redirecting to exe.dev login...</p>
                <a href="/__exe.dev/login?redirect=/" class="btn btn-primary" style="width: 100%;">GO TO LOGIN</a>
            </div>
        </div>
        {% else %}

        <div class="panel">
            <div class="panel-header">SELECT USER</div>
            <div class="panel-body">
                {% if users %}
                <form method="POST" action="/login">
                    <div class="form-group">
                        <label class="form-label" for="user_id">User</label>
                        <select name="user_id" id="user_id" class="form-select" required>
                            {% for user in users %}
                            <option value="{{ user.id }}">{{ user.name }}{% if user.is_admin %} [ADMIN]{% endif %}{% if user.email %} ({{ user.email }}){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">GO</button>
                </form>
                {% else %}
                <div class="empty-state" style="padding: var(--space-md);">
                    <div class="text-muted mono">No users found. Create one below.</div>
                </div>
                {% endif %}
            </div>
        </div>

        <div class="login-divider">or</div>

        <div class="panel">
            <div class="panel-header">CREATE NEW USER</div>
            <div class="panel-body">
                <form method="POST" action="/login/new-user">
                    <div class="form-group">
                        <label class="form-label" for="name">Name *</label>
                        <input type="text" name="name" id="name" class="form-input" required placeholder="Full Name">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" name="email" id="email" class="form-input" placeholder="Optional">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">CREATE</button>
                </form>
            </div>
        </div>

        {% endif %}
    </div>
</body>
</html>
