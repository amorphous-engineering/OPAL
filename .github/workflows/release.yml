name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.4.6). Defaults to latest tag on branch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_name: opal-macos-arm64
            python_arch: arm64
          - os: macos-latest
            asset_name: opal-macos-x86_64
            python_arch: x64
          - os: ubuntu-latest
            asset_name: opal-linux-x86_64
            python_arch: x64
          - os: windows-latest
            asset_name: opal-windows-x86_64.exe
            python_arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python_arch }}

      - uses: astral-sh/setup-uv@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: python
        run: |
          import re, pathlib
          version = "${{ github.ref_name }}"[1:]  # strip leading 'v'
          p = pathlib.Path("pyproject.toml")
          p.write_text(re.sub(r'^version = .*', f'version = "{version}"', p.read_text(), count=1, flags=re.MULTILINE))
          print(f"Set version to {version}")

      - name: Install dependencies
        run: uv sync --extra app

      - name: Build binary
        run: uv run pyinstaller opal.spec

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/opal ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist/opal.exe ${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir release-assets
          find artifacts -type f -exec mv {} release-assets/ \;
          ls -la release-assets/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            release-assets/* \
            --generate-notes \
            --latest
